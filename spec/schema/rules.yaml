# Portolan Validation Rules
#
# Rules that cannot be expressed in JSON Schema but are normative requirements.
# These rules are intended for programmatic validation in the CLI and registry.
#
# Rule structure:
#   id: Unique identifier (RULE-XXXX)
#   level: error | warning | info
#   scope: Where the rule applies (catalog, collection, item, asset, versions, config)
#   description: Human-readable description
#   rationale: Why this rule exists
#   validation: How to validate (pseudo-code or description)
#   references: Links to spec documentation
#   code_rule: (optional) The `name` of the portolan_cli ValidationRule that
#     enforces this rule, linking the spec entry to its CLI implementation.
#     Feeds the rule-coverage matrix and lets tests assert spec/code parity.

# Portolan specification version these rules belong to. The canonical home is
# spec/schema/spec-version.json; see spec/README.md#versioning for the bump
# policy (e.g. raising a rule's level from warning to error is a breaking
# change and bumps the spec version).
spec_version: "0.1.0"

rules:
  # =============================================================================
  # Asset URL Rules
  # =============================================================================

  - id: RULE-0001
    level: error
    scope: asset
    description: Asset hrefs in published catalogs MUST be absolute HTTPS URLs to S3-compatible storage
    rationale: |
      Portolan catalogs are designed for S3-compatible object storage.
      Absolute URLs ensure assets can be fetched without ambiguity.
    validation: |
      For each asset.href in collection.json or item.json:
        if catalog.is_published:
          assert href.startswith("https://")
          # Accepted providers (non-exhaustive):
          # - AWS S3: *.s3.amazonaws.com, *.s3.*.amazonaws.com
          # - DigitalOcean Spaces: *.digitaloceanspaces.com
          # - Cloudflare R2: *.r2.cloudflarestorage.com
          # - Backblaze B2: *.backblazeb2.com
          # - Wasabi: *.wasabisys.com
          # - MinIO: any hostname (custom deployments)
    references:
      - core.md#asset-urls

  - id: RULE-0002
    level: warning
    scope: asset
    description: Asset hrefs in local catalogs SHOULD be relative paths
    rationale: |
      Relative paths keep local catalogs portable before publishing.
    validation: |
      For each asset.href in collection.json or item.json:
        if not catalog.is_published:
          warn if href.startswith("https://")
    references:
      - core.md#asset-urls

  # =============================================================================
  # versions.json Path Rules
  # =============================================================================

  - id: RULE-0010
    level: error
    scope: versions
    description: Asset keys in versions.json MUST be collection-relative
    rationale: |
      Asset keys are scoped relative to the collection directory.
      The collection directory name MUST NOT appear in the asset key.
    validation: |
      For each asset_key in version.assets:
        assert not asset_key.startswith(collection_id + "/")
    references:
      - versions.md#path-resolution
    examples:
      valid:
        - "tunnels.parquet"  # Single-file collection
        - "districts/districts.parquet"  # Item within collection
      invalid:
        - "tunnels/tunnels.parquet"  # Duplicates collection directory

  - id: RULE-0011
    level: error
    scope: versions
    description: Asset hrefs in versions.json MUST be catalog-root-relative
    rationale: |
      hrefs enable tools to resolve files via `catalog_root / href`.
      They must include the collection directory.
    validation: |
      For each asset in version.assets:
        assert asset.href.startswith(collection_id + "/")
    references:
      - versions.md#path-resolution
    examples:
      valid:
        - "tunnels/tunnels.parquet"
        - "boundaries/districts/districts.parquet"

  - id: RULE-0012
    level: error
    scope: versions
    description: current_version MUST match the last entry in versions array
    rationale: |
      current_version is a convenience field that MUST be consistent with
      the versions array. Inconsistency causes sync failures and confuses tooling.
    validation: |
      if current_version is not null:
        assert versions is not empty
        assert current_version == versions[-1].version
      else:
        assert versions is empty
    references:
      - versions.md#current-version

  - id: RULE-0013
    level: error
    scope: versions
    description: changes array MUST only reference keys that exist in assets
    rationale: |
      The changes array documents which assets changed in a version.
      Referencing non-existent keys indicates data corruption or typos.
    validation: |
      For each version in versions:
        for change_key in version.changes:
          assert change_key in version.assets

  - id: RULE-0014
    level: error
    scope: versions
    description: Version strings MUST be unique within versions array
    rationale: |
      Each version represents a distinct point in time. Duplicate version
      strings make history ambiguous and break rollback functionality.
    validation: |
      version_strings = [v.version for v in versions]
      assert len(version_strings) == len(set(version_strings))

  - id: RULE-0015
    level: warning
    scope: versions
    description: Versions SHOULD be ordered chronologically (oldest first)
    rationale: |
      The spec defines versions array as "oldest first" for consistent tooling.
      Out-of-order versions may cause incorrect diff calculations.
    validation: |
      timestamps = [parse_iso8601(v.created) for v in versions]
      assert timestamps == sorted(timestamps)

  # =============================================================================
  # Collection ID Rules
  # =============================================================================

  - id: RULE-0020
    level: warning
    scope: collection
    description: Collection IDs SHOULD follow naming conventions
    rationale: |
      Consistent naming improves discoverability and avoids filesystem issues.
    validation: |
      assert collection_id matches /^[a-z][a-z0-9_-]*$/
    references:
      - structure.md#collection-level
    note: |
      The CLI does not currently enforce these naming conventions.
      Validation may be added in a future release.

  # =============================================================================
  # Content Inspection Rules
  # =============================================================================

  - id: RULE-0030
    level: error
    scope: asset
    description: GeoParquet files MUST contain geo metadata
    rationale: |
      A .parquet file without GeoParquet metadata is just a Parquet file.
      Content inspection ensures we don't import non-geospatial data.
    validation: |
      For each .parquet file:
        metadata = read_parquet_metadata(file)
        assert "geo" in metadata.schema.metadata
    references:
      - extensions.md#content-inspection

  - id: RULE-0031
    level: error
    scope: asset
    description: COG files MUST have internal tiling and overviews
    rationale: |
      Cloud-Optimized GeoTIFF requires internal structure for range-request access.
    validation: |
      For each .tif/.tiff file:
        assert is_valid_cog(file)  # Use rio-cogeo or similar
    references:
      - extensions.md#content-inspection
      - formats/raster.md

  - id: RULE-0032
    level: warning
    scope: asset
    description: Non-cloud-native formats SHOULD be converted
    rationale: |
      GeoJSON, Shapefile, GeoPackage work but cloud-native formats
      (GeoParquet, COG) are preferred for performance.
    validation: |
      For each file with extension in [.geojson, .shp, .gpkg, .json]:
        warn "Consider converting to GeoParquet"
    references:
      - extensions.md#non-cloud-native-format-handling

  # =============================================================================
  # Structural Rules
  # =============================================================================

  - id: RULE-0040
    level: error
    scope: catalog
    description: Catalog MUST use SELF_CONTAINED type (relative links)
    rationale: |
      SELF_CONTAINED catalogs are portable across hosting locations.
      No absolute filesystem paths should leak into metadata.
    validation: |
      For each link in catalog.json with rel in [root, self, parent, child]:
        # Unix absolute paths
        assert not link.href.startswith("/")
        # file:// URLs
        assert not link.href.startswith("file://")
        # Windows absolute paths (C:\, D:\, etc.)
        assert not re.match(r'^[A-Za-z]:', link.href)
        # Windows UNC paths (\\server\share)
        assert not link.href.startswith("\\\\")
        # Any URI scheme (http://, ftp://, s3://, etc.)
        assert not re.match(r'^[a-zA-Z][a-zA-Z0-9+.-]*://', link.href)
    references:
      - structure.md#stac-conventions
      - core.md#link-paths

  - id: RULE-0041
    level: error
    scope: catalog
    description: Catalog MUST have flat hierarchy (no nested sub-collections)
    rationale: |
      Flat hierarchy simplifies tooling and versioning boundaries.
    validation: |
      For each collection in catalog:
        assert collection has no child collections
        # Collections contain items directly
    references:
      - structure.md#flat-hierarchy

  - id: RULE-0042
    level: error
    scope: collection
    description: Single-file datasets MUST be collection-level assets
    rationale: |
      Item indirection adds no value for single-file datasets.
    validation: |
      If collection contains exactly one data file:
        assert file is in collection.assets, not wrapped in item
    references:
      - structure.md#single-file-collections
      - formats/vector.md#collection-level-assets

  # =============================================================================
  # Required Files Rules
  # =============================================================================

  - id: RULE-0050
    level: error
    scope: catalog
    description: Catalog root MUST contain required files
    rationale: |
      Standard structure enables tooling interoperability.
    validation: |
      assert exists(catalog_root / ".portolan/config.yaml")
      assert exists(catalog_root / "catalog.json")
      assert exists(catalog_root / "versions.json")
    references:
      - structure.md#root-level

  - id: RULE-0051
    level: error
    scope: collection
    description: Each collection MUST contain required files
    rationale: |
      Collections need metadata and version tracking.
    validation: |
      For each collection directory:
        assert exists(collection_dir / "collection.json")
        assert exists(collection_dir / "versions.json")
    references:
      - structure.md#collection-level

  - id: RULE-0052
    level: warning
    scope: catalog
    description: Catalog root SHOULD contain README.md
    rationale: |
      Documentation helps users understand the catalog contents.
    validation: |
      warn if not exists(catalog_root / "README.md")
    references:
      - core.md#root-documentation

  # =============================================================================
  # PMTiles Rules
  # =============================================================================

  - id: RULE-0060
    level: error
    scope: collection
    description: PMTiles MUST be collection-level assets when provided
    rationale: |
      Visualization derivatives should be discoverable at collection level
      without navigating into items.
    validation: |
      If any .pmtiles file exists:
        assert "pmtiles" in collection.assets or
               any asset has role "visual" with .pmtiles href
    references:
      - formats/vector.md#recommended-formats

  - id: RULE-0061
    level: error
    scope: collection
    description: PMTiles MUST have a rel="pmtiles" web-map-links link when provided
    rationale: |
      Follows the web-map-links STAC extension (v1.3.0) for discoverability: the
      PMTiles derivative must be reachable as a collection-level link, not only as
      an asset. The link and the asset coexist.
    validation: |
      If collection has PMTiles asset:
        assert any link has rel="pmtiles"
        assert that link has type="application/vnd.pmtiles"
        assert "https://stac-extensions.github.io/web-map-links/v1.3.0/schema.json"
               in collection.stac_extensions
    references:
      - formats/vector.md#recommended-formats
      - https://github.com/stac-extensions/web-map-links
    code_rule: pmtiles_link

  # =============================================================================
  # Visualization Styles Rules
  # =============================================================================

  - id: RULE-0065
    level: warning
    scope: collection
    description: Collections with PMTiles SHOULD include visualization styles
    rationale: |
      Styles enable immediate visualization without custom configuration.
      When PMTiles are provided, styles make the data instantly usable in map viewers.
    validation: |
      If collection has PMTiles asset:
        warn if no "portolan:styles" property exists
        warn if styles/ directory is empty
    references:
      - best-practices.md#visualization-styles
      - formats/vector.md#styling

  - id: RULE-0066
    level: error
    scope: collection
    description: Style assets MUST use correct type and role
    rationale: |
      Consistent asset metadata enables style discovery and validation.
    validation: |
      For each asset key matching "styles/*":
        assert asset.type == "application/json"
        assert "style" in asset.roles
    references:
      - best-practices.md#stac-registration

  - id: RULE-0067
    level: error
    scope: collection
    description: portolan:styles entries MUST reference existing assets
    rationale: |
      The manifest array must be consistent with actual assets.
      Missing assets break style pickers.
    validation: |
      If "portolan:styles" property exists:
        for style_key in collection["portolan:styles"]:
          assert style_key in collection.assets
    references:
      - best-practices.md#portolan-styles-manifest

  - id: RULE-0068
    level: error
    scope: asset
    description: Style files MUST be valid Mapbox GL v8 JSON
    rationale: |
      Invalid style JSON breaks map viewers at runtime.
    validation: |
      For each style asset (roles contains "style"):
        style_json = load_json(asset.href)
        assert style_json.version == 8
        assert "sources" in style_json
        assert "layers" in style_json
    references:
      - best-practices.md#style-file-format

  # =============================================================================
  # Version History Rules
  # =============================================================================

  - id: RULE-0070
    level: warning
    scope: collection
    description: Collections SHOULD include a version-history link
    rationale: |
      The version-history link (rel="version-history") enables discovery of
      the versions.json manifest. While not strictly required, it improves
      STAC client compatibility and enables version-aware browsing.
    validation: |
      For each collection.json:
        warn if no link has rel="version-history"
        if link with rel="version-history" exists:
          assert link.href ends with "versions.json"
          assert link.type == "application/json"
    references:
      - core.md#version-history-link
      - versions.md

  # =============================================================================
  # AI & LLM Integration Rules
  # =============================================================================

  - id: RULE-0080
    level: error
    scope: catalog
    description: Catalogs MUST include llms.txt link
    rationale: |
      AI agents and LLMs are a primary audience for Portolan catalogs.
      The llms.txt file provides context that STAC metadata alone cannot:
      plain-language descriptions, usage examples, and pitfalls to avoid.
    validation: |
      For catalog.json:
        assert any link has rel="llms"
        if link with rel="llms" exists:
          assert link.href ends with "llms.txt"
          assert link.type == "text/markdown"
          assert file exists at link.href
    references:
      - ai-integration.md
      - core.md#ai-llm-integration

  - id: RULE-0081
    level: error
    scope: collection
    description: Collections MUST include llms.txt link
    rationale: |
      Collection-level llms.txt provides everything an agent needs to work
      with a specific dataset: schema docs, query examples, data quality notes.
    validation: |
      For each collection.json:
        assert any link has rel="llms"
        if link with rel="llms" exists:
          assert link.href ends with "llms.txt"
          assert link.type == "text/markdown"
          assert file exists at link.href
    references:
      - ai-integration.md
      - core.md#ai-llm-integration

  - id: RULE-0082
    level: warning
    scope: catalog
    description: Catalog llms.txt SHOULD include recommended content
    rationale: |
      Effective llms.txt files follow established patterns for maximum utility.
      Missing key sections reduce the file's value to AI agents.
    validation: |
      For catalog llms.txt:
        warn if file does not mention collections or datasets
        warn if no code examples present
        warn if no license information present
    references:
      - ai-integration.md#catalog-level-llmstxt

  - id: RULE-0083
    level: warning
    scope: collection
    description: Collection llms.txt SHOULD include recommended content
    rationale: |
      Collection llms.txt should enable agents to immediately work with the data.
      Schema documentation and query examples are particularly valuable.
    validation: |
      For collection llms.txt:
        warn if no schema/field documentation present
        warn if no code/query examples present
        warn if no data access URLs present
    references:
      - ai-integration.md#collection-level-llmstxt

  # =============================================================================
  # Tabular (Non-Geospatial) Data Rules
  # =============================================================================

  - id: RULE-0090
    level: error
    scope: collection
    description: Tabular collections MUST have portolan:geospatial set to false
    rationale: |
      The portolan:geospatial flag distinguishes intentionally non-spatial
      collections from spatial collections with missing extent. This enables
      validators and federation agents to route queries correctly.
    validation: |
      Classify the collection by the content of its data assets: a collection
      with any geospatial asset (GeoParquet, raster/COG, or other geo format) is
      spatial; one with tabular assets (CSV/XLSX or plain Parquet) and no
      geospatial asset is tabular. A Parquet asset is only counted when its file
      is present and readable (an unreadable/remote Parquet is not assumed
      tabular).
      If the collection is tabular:
        assert collection["portolan:geospatial"] == false
    references:
      - formats/tabular.md#marking-collections-non-spatial

  - id: RULE-0091
    level: warning
    scope: collection
    description: Tabular collections SHOULD use the STAC Table extension
    rationale: |
      Because tabular data has no geometry to hint at its meaning, the schema
      is the primary semantic handle for consumers and agents. The table:columns
      property surfaces schema information in STAC without opening the Parquet file.
    validation: |
      If the collection is tabular (portolan:geospatial == false, or detected as
      tabular by asset content so the rule still applies before RULE-0090 is fixed):
        warn if "table:columns" not in collection
        warn if "https://stac-extensions.github.io/table" not in stac_extensions
    references:
      - formats/tabular.md#schema-documentation
      - https://github.com/stac-extensions/table

  - id: RULE-0092
    level: info
    scope: collection
    description: Tabular collection extent.spatial represents AOI, not geometry
    rationale: |
      STAC requires extent.spatial.bbox for collections. For tabular data with
      no intrinsic spatial footprint, the bbox represents the area-of-interest
      (AOI) the data pertains to. Portolan CLI always provides extent.spatial
      via automatic AOI inheritance from sibling collections or global fallback.
    validation: |
      If collection["portolan:geospatial"] == false:
        extent.spatial.bbox is treated as informational AOI, not a constraint
        Portolan CLI auto-populates via AOI inheritance
      If collection["portolan:geospatial"] == true or absent:
        extent.spatial.bbox represents actual spatial footprint
    references:
      - formats/tabular.md#spatial-extent-handling
      - core.md#spatial-extent-for-tabular-collections

  - id: RULE-0093
    level: warning
    scope: collection
    description: Tabular collections SHOULD have temporal extent when time-dimensioned
    rationale: |
      Most tabular data has a time dimension (time-series, reporting periods).
      Temporal extent enables time-based queries and browsing.
    validation: |
      If the collection is tabular (portolan:geospatial == false, or detected as
      tabular by asset content):
        warn if extent.temporal is not set and data appears to have time dimension
    references:
      - formats/tabular.md#temporal-extent

  - id: RULE-0094
    level: error
    scope: collection
    description: Tabular collections MUST use collection-level assets
    rationale: |
      Single-file tabular datasets should not be wrapped in STAC items.
      Collection-level assets are simpler and match the vector data pattern.
    validation: |
      If the collection is tabular (portolan:geospatial == false, or detected as
      tabular by asset content) and not partitioned (no partition:scheme):
        assert primary data is in collection.assets, not wrapped in items
    references:
      - formats/tabular.md#collection-level-assets

  - id: RULE-0095
    level: warning
    scope: config
    description: Standalone tabular files require tabular.enabled config
    rationale: |
      Tabular support is opt-in to prevent accidentally sweeping in stray
      CSV/Excel files. Users must explicitly enable it.
    validation: |
      If scan finds tabular files without companion geo files:
        if not config["tabular"]["enabled"]:
          reject with message explaining how to enable
    references:
      - formats/tabular.md#enabling-tabular-support

  # =============================================================================
  # Metadata Quality Rules (human-readable titles/descriptions)
  # =============================================================================
  #
  # Enforced by MandatoryTitlesRule (ERROR). STAC Browser renders child/item
  # link titles directly, so missing or raw-slug titles force it to fetch every
  # child just to display a name. See ADR-0053 and Issue #502.

  - id: RULE-0100
    level: error
    scope: catalog
    description: Catalogs MUST have a human-readable title and description
    rationale: |
      Titles and descriptions are the primary handle humans and agents use to
      understand a catalog. A missing or raw-slug title (e.g. snake_case or a
      "ns:Layer" namespace prefix) is not human-readable and degrades browsing.
    validation: |
      For catalog.json:
        assert title is a non-empty string
        assert title is human-readable (no underscores, no "prefix:Name" form)
        assert description is a non-empty string
    references:
      - core.md#human-readable-titles
    code_rule: mandatory_titles

  - id: RULE-0101
    level: error
    scope: collection
    description: Collections MUST have a human-readable title and description
    rationale: |
      Same as RULE-0100 at the collection level: a collection's title and
      description are what map viewers and agents surface first.
    validation: |
      For each collection.json:
        assert title is a non-empty string
        assert title is human-readable (no underscores, no "prefix:Name" form)
        assert description is a non-empty string
    references:
      - core.md#human-readable-titles
    code_rule: mandatory_titles

  - id: RULE-0102
    level: error
    scope: catalog
    description: Child links MUST include a human-readable title
    rationale: |
      STAC Browser renders child link titles without dereferencing the target.
      An untitled child link forces a fetch of every collection to show a name.
    validation: |
      For each link in catalog.json (or sub-catalog) with rel == "child":
        assert link.title is a non-empty string
    references:
      - core.md#human-readable-titles
    code_rule: mandatory_titles

  - id: RULE-0103
    level: error
    scope: collection
    description: Item links MUST include a human-readable title
    rationale: |
      As with child links, item link titles let clients render an item list
      without fetching each item.json.
    validation: |
      For each link in collection.json with rel == "item":
        assert link.title is a non-empty string
    references:
      - core.md#human-readable-titles
    code_rule: mandatory_titles

  # =============================================================================
  # Bounding Box Validity Rules
  # =============================================================================
  #
  # Enforced by BboxValidRule (ERROR). Garbage coordinates (inf/nan, sentinel
  # values like ±1.79e308, or out-of-range lon/lat) poison catalog-level extent
  # unions and break map-UI browsing. See Issue #516.

  - id: RULE-0110
    level: error
    scope: catalog
    description: Catalog extent bboxes MUST be valid
    rationale: |
      The catalog extent is the union of its collections; a single poisoned
      coordinate makes the whole catalog un-browsable in a map UI.
    validation: |
      For each bbox in catalog.extent.spatial.bbox:
        assert no coordinate is NaN or infinite
        assert no coordinate exceeds a sane magnitude (sentinel poison)
        assert lon in [-180, 180] and lat in [-90, 90]
        assert south <= north
    references:
      - core.md#bounding-box-validity
    code_rule: bbox_valid

  - id: RULE-0111
    level: error
    scope: collection
    description: Collection extent bboxes MUST be valid
    rationale: |
      Same validity constraints as RULE-0110 at the collection level.
    validation: |
      For each bbox in collection.extent.spatial.bbox:
        assert no coordinate is NaN or infinite
        assert no coordinate exceeds a sane magnitude (sentinel poison)
        assert lon in [-180, 180] and lat in [-90, 90]
        assert south <= north
    references:
      - core.md#bounding-box-validity
    code_rule: bbox_valid

  - id: RULE-0112
    level: error
    scope: item
    description: Item bboxes MUST be valid
    rationale: |
      Invalid item bboxes propagate into the collection and catalog extents.
    validation: |
      For each item.json with a bbox:
        assert no coordinate is NaN or infinite
        assert no coordinate exceeds a sane magnitude (sentinel poison)
        assert lon in [-180, 180] and lat in [-90, 90]
        assert south <= north
    references:
      - core.md#bounding-box-validity
    code_rule: bbox_valid

  # =============================================================================
  # Temporal Metadata Rules
  # =============================================================================

  - id: RULE-0120
    level: warning
    scope: item
    description: Items SHOULD have an explicit datetime, not a provisional one
    rationale: |
      Items added without an explicit datetime get a null temporal extent and
      are marked portolan:datetime_provisional=true (ADR-0035). They are valid
      STAC but incomplete; enriching the datetime enables time-based browsing.
    validation: |
      For each item.json:
        warn if properties["portolan:datetime_provisional"] is true
    references:
      - core.md#temporal-metadata
    code_rule: provisional_datetime

  # =============================================================================
  # Partition Structure Rules (Hive-style partitioned collections)
  # =============================================================================
  #
  # Enforced by PartitionStructureRule (WARNING) and
  # PartitionSchemaConsistencyRule (ERROR). See ADR-0042 and ADR-0054.

  - id: RULE-0130
    level: warning
    scope: collection
    description: Partitioned collections SHOULD have consistent Hive-style structure
    rationale: |
      Mixed partition keys, orphan data files at the collection root, or a
      missing partition:scheme make a partitioned dataset ambiguous to query
      engines that rely on the Hive key=value convention.
    validation: |
      For each collection with key=value partition directories:
        warn if partition directories use more than one partition key
        warn if there are orphan .parquet files at the collection root
        warn if collection.json is missing the partition:scheme field
    references:
      - formats/vector.md#partitioned-datasets
    code_rule: partition_structure

  - id: RULE-0131
    level: error
    scope: collection
    description: All partition files in a collection MUST share the same schema
    rationale: |
      A partitioned collection is a single logical table split across files.
      Divergent Parquet schemas across partitions break unified reads.
    validation: |
      For each collection with key=value partition directories:
        read the Parquet schema (footer) of every partition file
