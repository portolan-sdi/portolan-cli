# Pre-commit hooks - Tier 1 CI
# See context/shared/documentation/ci.md for the full CI strategy
#
# All hooks BLOCK on failure. No warnings, no skips.
# Install: uv run pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']  # Allow Python tags in mkdocs.yml
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: '^tests/fixtures/(realdata|raster|vector)/.*\.(parquet|tif)$'
      - id: check-merge-conflict
      - id: check-toml
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.1
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        args: [
          portolan_cli, tests, vulture_whitelist.py,
          --exclude, "portolan_cli/validation/rules.py,portolan_cli/backends/protocol.py,portolan_cli/backends/json_file.py,portolan_cli/backends/iceberg/backend.py",
        ]

  - repo: https://github.com/rubik/xenon
    rev: v0.9.3
    hooks:
      - id: xenon
        args: ['--max-absolute=C', '--max-modules=B', '--max-average=A', 'portolan_cli/']
        pass_filenames: false

  - repo: local
    hooks:
      # === SAFETY HOOKS ===
      # Prevent accidental commits of temporary/generated content

      - id: forbid-worktrees
        name: forbid worktree files
        entry: "bash -c 'echo ERROR - Worktree files should not be committed. Remove .claude/worktrees/ from staging. && exit 1'"
        language: system
        files: ^\.claude/worktrees/
        pass_filenames: false

      # === AUTO-UPDATE HOOKS ===
      # These regenerate content from code - keeps docs in sync automatically

      - id: update-claude-md
        name: auto-update CLAUDE.md sections
        entry: uv run python scripts/generate_claude_md_sections.py --update
        language: system
        files: ^(CLAUDE\.md|context/shared/adr/.*\.md|context/shared/known-issues/.*\.md|pyproject\.toml|portolan_cli/cli\.py)$
        pass_filenames: false

      - id: update-skill-md
        name: auto-update SKILL.md sections
        entry: uv run python scripts/generate_skill_md.py --write
        language: system
        files: ^(SKILL\.md|portolan_cli/__init__\.py|portolan_cli/cli\.py)$
        pass_filenames: false

      - id: update-freshness
        name: auto-update freshness markers
        entry: uv run python scripts/update_freshness.py
        language: system
        files: ^portolan_cli/(output|errors|constants|json_output|cli)\.py$
        pass_filenames: true

      - id: sync-sourcecoop-skill
        name: sync Source Co-op skill CLI reference
        entry: uv run python scripts/sync_sourcecoop_skill.py --update
        language: system
        files: ^(portolan_cli/cli\.py|portolan_cli/push\.py|portolan_cli/config\.py|portolan_cli/metadata_yaml\.py|portolan_cli/readme\.py|scripts/sync_sourcecoop_skill\.py|portolan_cli/skills/sourcecoop\.md)$
        pass_filenames: false

      # === VALIDATION HOOKS ===

      - id: validate-claude-md
        name: validate CLAUDE.md references
        entry: uv run python scripts/validate_claude_md.py
        language: system
        files: ^(CLAUDE\.md|context/shared/adr/.*\.md|context/shared/known-issues/.*\.md)$
        pass_filenames: false

      - id: validate-skill-md
        name: validate SKILL.md structure
        entry: uv run python scripts/validate_skill_md.py
        language: system
        files: ^(SKILL\.md|portolan_cli/__init__\.py|portolan_cli/cli\.py)$
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        args: [portolan_cli]
        pass_filenames: false

      - id: fast-tests
        name: fast tests
        entry: uv run pytest
        language: system
        types: [python]
        args: [tests/, -m, unit, --timeout=30, -q, -x]
        pass_filenames: false
        stages: [pre-push]  # Moved from pre-commit for faster commits

      - id: import-linter
        name: architecture rules
        entry: uv run lint-imports
        language: system
        files: ^(pyproject\.toml|portolan_cli/.*\.py)$
        pass_filenames: false

      - id: deptry
        name: dependency checker
        entry: uv run deptry .
        language: system
        files: ^(pyproject\.toml|portolan_cli/.*\.py)$
        pass_filenames: false

      # === DOCUMENTATION SYNC HOOKS ===
      # menard: detect when code changes require doc updates (requires Python 3.10+)

      - id: menard-check
        name: check documentation freshness
        entry: uv run menard check
        language: system
        files: ^portolan_cli/.*\.py$
        pass_filenames: false

      - id: menard-protected
        name: check protected content
        entry: uv run menard check-protected
        language: system
        files: \.(md|py)$
        exclude: \.gdb/
        pass_filenames: false

      # TODO: Enable when menard[brevity] is published to PyPI
      # - id: menard-brevity
      #   name: check for duplicate documentation
      #   entry: uv run menard brevity --threshold 0.95
      #   language: system
      #   files: \.md$
      #   pass_filenames: false

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.1.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
