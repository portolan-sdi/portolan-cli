version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5

  # Python dependencies - weekly updates (features + patches)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 10
    # Group minor and patch updates together
    groups:
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  # Python security updates - daily, lockfile-only
  # This catches CVEs quickly without waiting for weekly run.
  # The security-audit.yml workflow creates issues; Dependabot creates PRs.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "python"
      - "security"
    # Disable regular version PRs - only security advisories trigger PRs
    open-pull-requests-limit: 0
    # Only lockfile changes allowed
    versioning-strategy: "lockfile-only"
