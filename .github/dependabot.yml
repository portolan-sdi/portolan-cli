version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Wait 7 days before proposing a freshly-published version: fresh releases
    # are where supply-chain compromises surface, and the delay lets advisories
    # and yanks catch up before the update reaches a PR (zizmor dependabot-cooldown).
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5

  # Python dependencies - weekly updates (features + patches)
  # Note: Dependabot automatically prioritizes security updates regardless of
  # schedule. The security-audit.yml workflow handles daily notification via
  # GitHub issues. No separate daily entry needed (would conflict with this one).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    # See the github-actions block above: 7-day delay before adopting a fresh
    # release (zizmor dependabot-cooldown).
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 10
    # Group minor and patch updates together
    groups:
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
