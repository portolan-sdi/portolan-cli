# Tier 2 CI - Runs on every PR and push to main
# See context/shared/documentation/ci.md for the full CI strategy
#
# Philosophy: Starting from zero, all quality gates are STRICT.
# Nothing passes with warnings - fix issues or they block the PR.
#
# Supply-chain hardening:
# - Least-privilege GITHUB_TOKEN: read-only at the top level, widened per job.
# - Third-party actions are SHA-pinned with a trailing version comment
#   (Dependabot maintains the pins). actionlint + zizmor (prek.toml) guard this.
# - persist-credentials: false on every checkout (no job pushes to the repo).
# - Every job has a timeout so a hung step can't burn the runner budget.
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering

# Least-privilege default; no job here writes to the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (a new push to a PR obsoletes the old).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      iceberg: ${{ steps.filter.outputs.iceberg }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            iceberg:
              - 'portolan_cli/backends/iceberg/**'
              - 'tests/iceberg/**'
              - 'pyproject.toml'
            python:
              - 'portolan_cli/**/*.py'

  quality:
    name: Quality Gates (prek — single rule source)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history so menard's doc-freshness diffing has a base to compare.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.6.14"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 15
          command: uv sync --all-extras

      - name: Run all quality gates
        # ONE rule source: CI runs the SAME hooks developers run locally
        # (prek.toml), not a re-listing of each tool with its own drifting args.
        # This covers ruff, ruff-format, mypy, import-linter, codespell, vulture,
        # xenon, pylint-duplicate, bandit, deptry, menard doc-freshness,
        # actionlint, zizmor, and the builtin file hooks.
        #
        # SKIP:
        # - no-commit-to-branch: meaningless in CI and fails on push-to-main
        #   (HEAD is `main`).
        # - fast-tests: the full matrix runs in the `test` job below.
        # - update-freshness: stamps today's date into freshness markers, so it
        #   is non-deterministic across days — a validation gate, not a mutation,
        #   is what CI needs. Doc drift is still caught by menard-check and
        #   validate-claude-md (both non-mutating), which DO run here.
        env:
          SKIP: no-commit-to-branch,fast-tests,update-freshness
        run: uvx prek run --all-files --show-diff-on-failure

  security:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.6.14"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 15
          command: uv sync --all-extras

      - name: Audit dependencies (runtime + extras only)
        # Audit only what we ship: core runtime deps plus the publishable extras
        # (iceberg, pmtiles, thumbnails). Dev-group deps (moto, pytest, pip-audit
        # itself...) and doc-build deps (mkdocs, pymdown-extensions...) are excluded
        # because they never reach users via the wheel.
        #
        # Ignores come from the single-source .pip-audit-ignores file (each entry
        # has an expiry + reason; expired entries drop automatically). The same
        # file feeds nightly.yml and security-audit.yml — no more triplicated,
        # never-expiring inline --ignore-vuln lists.
        run: |
          uv export --no-dev --no-emit-project --no-hashes \
            --extra iceberg --extra pmtiles --extra thumbnails \
            -o /tmp/runtime-deps.txt
          # shellcheck disable=SC2046  # intentional word-splitting of the flag list
          uv run pip-audit \
            --requirement /tmp/runtime-deps.txt \
            $(uv run python scripts/pip_audit_ignores.py)

  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
        exclude:
          # Reduce matrix size - test older Python only on Linux
          - os: macos-latest
            python-version: '3.10'
          - os: windows-latest
            python-version: '3.10'
    env:
      # Prevent obstore from attempting EC2 metadata service calls
      # GitHub Actions runners aren't EC2 instances, so IMDS requests fail
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.6.14"

      - name: Set up Python ${{ matrix.python-version }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install ${{ matrix.python-version }}

      - name: Install tippecanoe (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y tippecanoe

      - name: Install tippecanoe (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install tippecanoe

      - name: Install dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 15
          command: uv sync --all-extras

      - name: Run tests (unit + integration, no network, no iceberg)
        run: uv run pytest tests/ --ignore=tests/iceberg/ -v --tb=short -m "not network and not slow and not benchmark" -n auto --dist loadscope --cov=portolan_cli --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: portolan-sdi/portolan-cli

  iceberg-test:
    name: Iceberg Unit & Integration Tests (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.iceberg == 'true' || github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']
    env:
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.6.14"

      - name: Set up Python ${{ matrix.python-version }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 15
          command: uv sync --extra iceberg --extra dev

      - name: Run unit and integration tests
        run: uv run pytest tests/iceberg/ -v --tb=short -m "not e2e and not e2e_slow and not network and not slow" --cov=portolan_cli/backends/iceberg --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: portolan-sdi/portolan-cli
          flags: iceberg

  iceberg-e2e:
    name: Iceberg E2E Tests (Python ${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.iceberg == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.6.14"

      - name: Set up Python ${{ matrix.python-version }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 15
          command: uv sync --extra iceberg --extra dev --extra e2e

      - name: Start Docker services
        run: docker compose -f tests/iceberg/e2e/docker-compose.yml up -d --wait

      - name: Wait for REST catalog
        run: timeout 60 bash -c 'until curl -sf http://localhost:8181/v1/config; do sleep 2; done'

      - name: Wait for MinIO
        run: timeout 60 bash -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 2; done'

      - name: Run E2E tests (fast tier, excludes e2e_slow)
        run: uv run pytest tests/iceberg/e2e/ -v --tb=long -m "e2e and not e2e_slow" --timeout=120

      - name: Docker logs (on failure)
        if: failure()
        run: docker compose -f tests/iceberg/e2e/docker-compose.yml logs

      - name: Teardown
        if: always()
        run: docker compose -f tests/iceberg/e2e/docker-compose.yml down -v

  docs:
    name: Documentation Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.6.14"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 15
          command: uv sync --all-extras

      - name: Build documentation
        run: uv run mkdocs build --strict

      - name: Test documentation examples
        run: uv run pytest tests/docs/ -v --tb=short

  build:
    name: Build Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.6.14"

      - name: Set up Python
        run: uv python install 3.11

      - name: Build package
        run: uv build

      - name: Check package contents
        run: |
          uv run python -c "import tarfile; t = tarfile.open(list(__import__('pathlib').Path('dist').glob('*.tar.gz'))[0]); print('\n'.join(t.getnames()))"

  mutation-pr:
    name: Mutation Testing (changed files)
    needs: changes
    # PR-only: mutate just the portolan_cli files this PR changed, so mutation
    # feedback lands on new code when the author can act on it. The nightly sweep
    # (nightly.yml) covers the whole tree over time. Advisory for now — NOT in
    # ci-success below — because the .mutation-baseline floor is not yet validated
    # against a real full run; promote it to a required gate (add to ci-success
    # needs) once the floor is trustworthy. See #612.
    if: github.event_name == 'pull_request' && needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history so the PR base commit is available to diff against.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.6.14"

      - name: Set up Python
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install 3.11

      - name: Install dependencies
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 15
          command: uv sync --all-extras

      - name: Determine changed source files
        id: changed
        env:
          # Trusted github context, passed via env not spliced into the script
          # body (zizmor template-injection guard).
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # Files this PR added/modified under portolan_cli (deletions excluded —
          # a deleted file has no mutants). Trailing * so mutmut fnmatches each
          # file's mutant names (portolan_cli/foo.py:func__mutmut_1).
          GLOBS=()
          while IFS= read -r f; do
            [ -n "$f" ] && GLOBS+=("${f}*")
          done < <(git diff --name-only --diff-filter=d "$BASE_SHA" HEAD -- 'portolan_cli/**/*.py')
          echo "Changed source files: ${#GLOBS[@]}"
          printf '  %s\n' "${GLOBS[@]}"
          {
            echo 'globs<<GLOBS_EOF'
            printf '%s\n' "${GLOBS[@]}"
            echo 'GLOBS_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run mutation testing on changed files
        env:
          GLOBS_RAW: ${{ steps.changed.outputs.globs }}
        run: |
          mapfile -t RAW <<< "$GLOBS_RAW"
          GLOBS=()
          for g in "${RAW[@]}"; do [ -n "$g" ] && GLOBS+=("$g"); done
          if [ "${#GLOBS[@]}" -eq 0 ]; then
            echo "No mutable source changes (only deletions?); nothing to run."
            exit 0
          fi
          # Surviving mutants make mutmut exit non-zero; the floor check is
          # authoritative, so don't fail on mutmut's own exit code.
          uv run mutmut run "${GLOBS[@]}" || true

      - name: Enforce mutation floor (changed files)
        run: |
          # A PR touching only comments/docstrings yields no mutants, so mutmut
          # writes no stats — a legitimate pass here (unlike the nightly sweep),
          # encoded by --allow-empty. The nightly full run stays the authoritative
          # broken-baseline gate.
          uv run mutmut export-cicd-stats || true
          if [ ! -f mutants/mutmut-cicd-stats.json ]; then
            echo "No mutants in changed files; nothing to score."
            exit 0
          fi
          uv run python scripts/mutation_score.py \
            --stats mutants/mutmut-cicd-stats.json \
            --baseline .mutation-baseline \
            --summary "$GITHUB_STEP_SUMMARY" \
            --label "changed files" \
            --allow-empty

  ci-success:
    name: CI Success
    # Single aggregated status check for branch protection. Requiring THIS one
    # context (see scripts/apply_branch_protection.sh) instead of every matrix
    # cell means adding a Python version or OS never silently drops a required
    # check, and the conditionally-skipped iceberg jobs don't block PRs that
    # don't touch iceberg.
    if: always()
    needs: [quality, security, test, iceberg-test, iceberg-e2e, docs, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify all required jobs succeeded
        env:
          # Trusted github context (success|failure|skipped|cancelled), passed
          # through env rather than spliced into the script body (zizmor).
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Dependency results: $RESULTS"
          # A skipped job (e.g. iceberg on a non-iceberg PR) is fine; a failed or
          # cancelled one is not.
          IFS=','
          for r in $RESULTS; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required CI job did not succeed (result: $r)"
              exit 1
            fi
          done
          echo "All required jobs passed (or were legitimately skipped)."
