name: Sync Schemas to Spec

on:
  push:
    branches: [main]
    paths:
      - 'tests/spec_compliance/schemas/versions.schema.json'
      - 'tests/spec_compliance/schemas/collection.schema.json'
      - 'tests/spec_compliance/schemas/catalog.schema.json'
      - 'tests/spec_compliance/schemas/rules.yaml'

jobs:
  sync-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CLI repo
        uses: actions/checkout@v4

      - name: Checkout Spec repo
        uses: actions/checkout@v4
        with:
          repository: portolan-sdi/portolan-spec
          token: ${{ secrets.SPEC_REPO_PAT }}
          path: spec-repo

      - name: Copy schemas to spec
        run: |
          # Canonical schemas (synced to spec)
          cp tests/spec_compliance/schemas/versions.schema.json spec-repo/schema/
          cp tests/spec_compliance/schemas/collection.schema.json spec-repo/schema/
          cp tests/spec_compliance/schemas/catalog.schema.json spec-repo/schema/
          cp tests/spec_compliance/schemas/rules.yaml spec-repo/schema/

          # CLI-only (not synced):
          # - catalog-versions.schema.json (root versions.json is Portolan impl detail)
          # - README.md (CLI-specific vendoring docs)

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SPEC_REPO_PAT }}
          path: spec-repo
          branch: sync/cli-schemas
          delete-branch: true
          title: "sync: Update schemas from portolan-cli"
          body: |
            Automated schema sync from portolan-cli.

            **Source commit:** portolan-sdi/portolan-cli@${{ github.sha }}
            **Triggered by:** ${{ github.event.head_commit.message }}

            ## Files synced
            - `versions.schema.json`
            - `collection.schema.json`
            - `catalog.schema.json`
            - `rules.yaml`

            ## Not synced (CLI-only)
            - `catalog-versions.schema.json` — validates root `versions.json` (Portolan implementation detail)

            ---
            _Auto-generated by [sync-schemas-to-spec](https://github.com/portolan-sdi/portolan-cli/blob/main/.github/workflows/sync-schemas-to-spec.yml)_
          commit-message: "sync: Update schemas from portolan-cli"
          labels: |
            automated
            schemas
