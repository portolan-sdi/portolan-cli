name: Sync Skills Install Instructions

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:  # Manual trigger

# Least-privilege default; the job widens to open its sync PR.
permissions:
  contents: read

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write        # create-pull-request pushes the sync branch
      pull-requests: write   # ...and opens the PR
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Sync from upstream
        run: python scripts/sync_skills_readme.py --update

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync/skills-install
          delete-branch: true
          title: "sync: Update skills install instructions"
          body: |
            Automated sync of installation instructions from [portolan-skills](https://github.com/portolan-sdi/portolan-skills).

            ---
            _Auto-generated by [sync-skills](https://github.com/portolan-sdi/portolan-cli/blob/main/.github/workflows/sync-skills.yml)_
          commit-message: "sync: Update skills install instructions from upstream"
          labels: |
            automated
            skills
