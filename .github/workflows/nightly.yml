# Tier 3 CI - Scheduled nightly checks
# See context/shared/documentation/ci.md for the full CI strategy
#
# Philosophy: These are the "expensive" checks that would slow down PRs.
# They still fail the build - we track trends but don't accept regressions.
name: Nightly
on:
  schedule:
    - cron: '0 4 * * *'  # 4 AM UTC daily
  workflow_dispatch:  # Allow manual triggering

# Nightly jobs only read the repo. A job needing more (e.g. network-live opening
# a tracking issue) widens its own permissions block.
permissions:
  contents: read

jobs:
  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Set up Python
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run mutation testing
        run: |
          # mutmut 3.x auto-detects paths (config in pyproject.toml [tool.mutmut])
          uv run mutmut run

      - name: Check mutation score
        run: |
          # mutmut 3.x: export structured JSON for CI parsing
          uv run mutmut export-cicd-stats

          # Parse JSON stats (mutmut 3.x outputs to mutants/mutmut-cicd-stats.json)
          STATS_FILE="mutants/mutmut-cicd-stats.json"
          if [ ! -f "$STATS_FILE" ]; then
            echo "::error::No mutation stats file found at $STATS_FILE"
            exit 1
          fi

          KILLED=$(jq -r '.killed' "$STATS_FILE")
          SURVIVED=$(jq -r '.survived' "$STATS_FILE")
          NO_TESTS=$(jq -r '.no_tests' "$STATS_FILE")
          TIMEOUT=$(jq -r '.timeout' "$STATS_FILE")
          SUSPICIOUS=$(jq -r '.suspicious' "$STATS_FILE")

          # Total testable mutants (exclude "no tests" from calculation)
          TESTABLE=$((KILLED + SURVIVED))

          echo "Mutation results:"
          echo "  Killed: $KILLED"
          echo "  Survived: $SURVIVED"
          echo "  No tests: $NO_TESTS"
          echo "  Timeout: $TIMEOUT"
          echo "  Suspicious: $SUSPICIOUS"
          echo "  Total testable: $TESTABLE"

          # Zero testable mutants means mutmut generated/parsed nothing — that
          # is mutation testing being SILENTLY BROKEN, not a pass. This exact
          # no-op shipped before (the old code `exit 0`d here), so treat it as a
          # hard failure that demands investigation.
          if [ "$TESTABLE" -eq 0 ]; then
            echo "::error::No testable mutants were generated/parsed — mutation testing is silently broken. See portolan-sdi/portolan-cli#612 (sandbox baseline + scalability)."
            exit 1
          fi

          # Calculate kill rate (higher is better)
          KILL_RATE=$(echo "scale=2; $KILLED * 100 / $TESTABLE" | bc)
          echo "Mutation kill rate: $KILL_RATE% ($KILLED killed, $SURVIVED survived)"

          # Floor comes from .mutation-baseline (first non-comment, non-blank
          # line) so it can be ratcheted in a reviewable, single-line diff.
          MIN_KILL_RATE=$(grep -vE '^\s*#' .mutation-baseline | grep -vE '^\s*$' | head -1)
          if ! [[ "$MIN_KILL_RATE" =~ ^[0-9]+$ ]]; then
            echo "::error::.mutation-baseline floor is not an integer: '$MIN_KILL_RATE'"
            exit 1
          fi

          {
            echo "## Mutation Testing"
            echo ""
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Kill rate | ${KILL_RATE}% |"
            echo "| Floor | ${MIN_KILL_RATE}% |"
            echo "| Killed | $KILLED |"
            echo "| Survived | $SURVIVED |"
            echo "| Total testable | $TESTABLE |"
          } >> "$GITHUB_STEP_SUMMARY"

          below_floor=$(echo "$KILL_RATE < $MIN_KILL_RATE" | bc)
          if [ "$below_floor" -eq 1 ]; then
            echo "::error::Mutation kill rate ($KILL_RATE%) is below the ${MIN_KILL_RATE}% floor from .mutation-baseline"
            echo "Tests are not catching enough bugs. Review survived mutants:"
            uv run mutmut results --all true | grep -E ': survived$' | head -20
            exit 1
          fi

      - name: Generate mutation report
        if: always()
        run: |
          # Generate text report for artifact (mutmut 3.x has no HTML export)
          # Note: JSON stats only have aggregates, not individual mutations
          uv run mutmut results --all true > mutation-results.txt
          # Also save the JSON stats
          cp mutants/mutmut-cicd-stats.json .

      - name: Upload mutation report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report
          path: |
            mutation-results.txt
            mutmut-cicd-stats.json
          retention-days: 30
        if: always()

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0  # Full history to compare with previous runs

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Set up Python
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run benchmarks
        run: |
          # Run benchmarks and save results
          uv run pytest tests/ \
            -m benchmark \
            --benchmark-json=benchmark-results.json \
            --benchmark-autosave \
            -v

      - name: Check for performance regression
        run: |
          # If baseline exists, compare and fail on >20% regression
          if [ -f .benchmarks/baseline.json ]; then
            uv run pytest-benchmark compare \
              benchmark-results.json \
              .benchmarks/baseline.json \
              --fail-on=20
          else
            echo "No baseline found. This run will establish the baseline."
            mkdir -p .benchmarks
            cp benchmark-results.json .benchmarks/baseline.json
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: benchmark-results.json
          retention-days: 90
        if: always()

  network-live:
    name: Live Network Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Non-blocking: live third-party servers (ArcGIS, WFS, ...) being flaky is not
    # something a contributor can fix, so a failure does NOT fail the workflow —
    # it opens/updates a single tracking issue instead (mirrors security-audit.yml).
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Set up Python
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run network tests against live services
        id: nettests
        # Keep the workflow green; the tracking-issue step below is the signal.
        continue-on-error: true
        run: |
          uv run pytest tests/ \
            -m network \
            --timeout=120 \
            -v

      - name: Track live-network status as a single issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          # Trusted github context, via env not a ${{ }} splice into JS (zizmor).
          TESTS_OUTCOME: ${{ steps.nettests.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const {owner, repo} = context.repo;
            const outcome = process.env.TESTS_OUTCOME;
            const runUrl = process.env.RUN_URL;
            const label = 'nightly-network-failure';
            const title = 'Nightly live-network tests are failing';

            // Ensure the tracking label exists (idempotent).
            try {
              await github.rest.issues.getLabel({owner, repo, name: label});
            } catch {
              await github.rest.issues.createLabel({
                owner, repo, name: label, color: 'd73a4a',
                description: 'Auto-managed: nightly live-network test failures',
              });
            }

            const {data: open} = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: label,
            });
            const existing = open[0];

            if (outcome === 'failure') {
              const body = [
                'The nightly **live-network** test job failed against third-party',
                'services. This job is non-blocking (live servers can be flaky), but a',
                'persistent failure may indicate a real regression in an extractor.',
                '',
                `Latest failing run: ${runUrl}`,
                '',
                '_Managed automatically — closes when the next nightly run passes._',
              ].join('\n');
              if (existing) {
                await github.rest.issues.update({owner, repo, issue_number: existing.number, body});
                await github.rest.issues.createComment({
                  owner, repo, issue_number: existing.number,
                  body: `Still failing — ${runUrl}`,
                });
              } else {
                await github.rest.issues.create({owner, repo, title, labels: [label], body});
              }
            } else if (existing) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.number,
                body: `Live-network tests recovered — closing. ${runUrl}`,
              });
              await github.rest.issues.update({owner, repo, issue_number: existing.number, state: 'closed'});
            }

  slow-tests:
    name: Slow Tests (Stress/Scale)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Set up Python
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run slow tests (stress/scale scenarios)
        run: |
          uv run pytest tests/ \
            -m slow \
            --timeout=300 \
            -v

  dependency-check:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Note: Job-level continue-on-error removed. Only audit steps soft-fail.
    # Setup steps (checkout, uv, python) fail fast on errors.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Set up Python
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Full security audit
        # Soft-fail: security-audit.yml creates issues, this is informational.
        # Ignores come from the single-source .pip-audit-ignores file (expiry +
        # reason per entry). Same file feeds ci.yml and security-audit.yml.
        continue-on-error: true
        run: |
          echo "=== Dependency security audit ==="
          # shellcheck disable=SC2046  # intentional word-splitting of the flag list
          uv run pip-audit --strict \
            $(uv run python scripts/pip_audit_ignores.py)

      - name: Check for outdated dependencies
        # Informational only, soft-fail
        continue-on-error: true
        run: |
          echo "=== Outdated dependencies ==="
          uv pip list --outdated

  iceberg-e2e-full:
    name: Iceberg E2E Tests (Full Suite)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Set up Python
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra iceberg --extra dev --extra e2e

      - name: Start Docker services
        run: docker compose -f tests/iceberg/e2e/docker-compose.yml up -d --wait

      - name: Wait for REST catalog
        run: timeout 60 bash -c 'until curl -sf http://localhost:8181/v1/config; do sleep 2; done'

      - name: Wait for MinIO
        run: timeout 60 bash -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 2; done'

      - name: Run E2E tests (full suite, includes e2e_slow)
        run: uv run pytest tests/iceberg/e2e/ -v --tb=long -m e2e --timeout=120

      - name: Docker logs (on failure)
        if: failure()
        run: docker compose -f tests/iceberg/e2e/docker-compose.yml logs

      - name: Teardown
        if: always()
        run: docker compose -f tests/iceberg/e2e/docker-compose.yml down -v
