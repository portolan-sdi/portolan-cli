# Tier 3 CI - Scheduled nightly checks
# See context/shared/documentation/ci.md for the full CI strategy
#
# Philosophy: These are the "expensive" checks that would slow down PRs.
# They still fail the build - we track trends but don't accept regressions.
name: Nightly
on:
  schedule:
    - cron: '0 4 * * *'  # 4 AM UTC daily
  workflow_dispatch:  # Allow manual triggering

# Nightly jobs only read the repo. A job needing more (e.g. network-live opening
# a tracking issue) widens its own permissions block.
permissions:
  contents: read

jobs:
  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Select nightly shard
        id: shard
        run: |
          # Mutating all ~45k mutants can't finish in one nightly window, so each
          # night mutates a deterministic 1/NUM_SHARDS slice of the source files,
          # round-robin over the sorted file list keyed by day-of-year. The whole
          # tree is covered every NUM_SHARDS nights. Lower NUM_SHARDS to cover more
          # per night — but only if a run still finishes within timeout-minutes.
          # (PR-scoped mutation of changed files is the fast, per-change gate; this
          # sweep is the slow, whole-codebase trend. See #612.)
          NUM_SHARDS=25
          mapfile -t FILES < <(find portolan_cli -name '*.py' -type f | sort)
          DAY=$(( 10#$(date -u +%j) ))
          SHARD=$(( DAY % NUM_SHARDS ))
          GLOBS=()
          for i in "${!FILES[@]}"; do
            if (( i % NUM_SHARDS == SHARD )); then
              # Trailing * so mutmut fnmatches this file's mutant names
              # (e.g. portolan_cli/foo.py:func__mutmut_1).
              GLOBS+=("${FILES[$i]}*")
            fi
          done
          echo "Shard ${SHARD} of ${NUM_SHARDS}: ${#GLOBS[@]} file(s)"
          printf '  %s\n' "${GLOBS[@]}"
          {
            echo 'globs<<GLOBS_EOF'
            printf '%s\n' "${GLOBS[@]}"
            echo 'GLOBS_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run mutation testing (rotating shard)
        env:
          GLOBS_RAW: ${{ steps.shard.outputs.globs }}
        run: |
          # mutmut still generates every mutant (~1 min) then tests only the
          # shard's. Surviving mutants make mutmut exit non-zero; the floor check
          # is authoritative, so the job does not fail on mutmut's own exit code.
          mapfile -t RAW <<< "$GLOBS_RAW"
          GLOBS=()
          for g in "${RAW[@]}"; do [ -n "$g" ] && GLOBS+=("$g"); done
          if [ "${#GLOBS[@]}" -eq 0 ]; then
            # An empty shard means no source files — the floor check below (no
            # --allow-empty) is the authoritative #612 silent-green guard, so let
            # it fail on zero mutants rather than running mutmut with an empty glob.
            echo "No files in this shard; nothing to run."
            exit 0
          fi
          uv run mutmut run "${GLOBS[@]}" || true

      - name: Enforce mutation floor
        run: |
          # Export aggregates and enforce the .mutation-baseline floor. No
          # --allow-empty here: on the full sweep, zero testable mutants means
          # mutation testing is broken (the #612 silent-green guard), not a pass.
          uv run mutmut export-cicd-stats
          uv run python scripts/mutation_score.py \
            --stats mutants/mutmut-cicd-stats.json \
            --baseline .mutation-baseline \
            --summary "$GITHUB_STEP_SUMMARY" \
            --label "nightly shard"

      - name: Generate mutation report
        if: always()
        run: |
          # Generate text report for artifact (mutmut 3.x has no HTML export)
          # Note: JSON stats only have aggregates, not individual mutations
          uv run mutmut results --all true > mutation-results.txt
          # Also save the JSON stats
          cp mutants/mutmut-cicd-stats.json .

      - name: Upload mutation report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report
          path: |
            mutation-results.txt
            mutmut-cicd-stats.json
          retention-days: 30
        if: always()

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0  # Full history to compare with previous runs

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run benchmarks
        run: |
          # Run benchmarks and save results
          uv run pytest tests/ \
            -m benchmark \
            --benchmark-json=benchmark-results.json \
            --benchmark-autosave \
            -v

      - name: Check for performance regression
        run: |
          # If baseline exists, compare and fail on >20% regression
          if [ -f .benchmarks/baseline.json ]; then
            uv run pytest-benchmark compare \
              benchmark-results.json \
              .benchmarks/baseline.json \
              --fail-on=20
          else
            echo "No baseline found. This run will establish the baseline."
            mkdir -p .benchmarks
            cp benchmark-results.json .benchmarks/baseline.json
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: benchmark-results.json
          retention-days: 90
        if: always()

  network-live:
    name: Live Network Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Non-blocking: live third-party servers (ArcGIS, WFS, ...) being flaky is not
    # something a contributor can fix, so a failure does NOT fail the workflow —
    # it opens/updates a single tracking issue instead (mirrors security-audit.yml).
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run network tests against live services
        id: nettests
        # Keep the workflow green; the tracking-issue step below is the signal.
        continue-on-error: true
        run: |
          # -rfE prints a short "FAILED/ERROR" summary at the tail; tee keeps a
          # copy so the run-summary + tracking-issue steps below can name the
          # tests that failed. Default bash pipefail preserves pytest's exit
          # code through the pipe, so the step outcome is unchanged.
          uv run pytest tests/ \
            -m network \
            --timeout=120 \
            -v -rfE \
            2>&1 | tee network-test-output.txt

      - name: Surface network-test failure in run summary
        # continue-on-error above keeps the job badge green even though the
        # step's real outcome was 'failure' — which has misled triage. Make the
        # failure legible in the run summary and capture the failing test names
        # for the tracking issue body. Pass/fail semantics are untouched: this
        # only runs on the failure path and only adds information.
        if: steps.nettests.outcome == 'failure'
        run: |
          {
            echo "## ⚠️ Live network tests FAILED (non-blocking)"
            echo ""
            echo "The \`nettests\` step outcome was **failure**, but the job badge"
            echo "stays green by design (live third-party services). See the"
            echo "tracking issue for history."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if grep -E '^(FAILED|ERROR)' network-test-output.txt \
               > network-test-failures.txt; then
            {
              echo "Failing tests:"
              echo ""
              echo '```'
              cat network-test-failures.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No individual FAILED/ERROR lines were captured (the step may" \
                 "have crashed before pytest reported)._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Track live-network status as a single issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          # Trusted github context, via env not a ${{ }} splice into JS (zizmor).
          TESTS_OUTCOME: ${{ steps.nettests.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');
            const {owner, repo} = context.repo;
            const outcome = process.env.TESTS_OUTCOME;
            const runUrl = process.env.RUN_URL;
            const label = 'nightly-network-failure';
            const title = 'Nightly live-network tests are failing';

            // Failing-test names captured by the "Surface network-test failure"
            // step (pytest -rfE short summary). Best-effort: absent if the step
            // crashed before pytest reported.
            let failures = '';
            try {
              failures = fs.readFileSync('network-test-failures.txt', 'utf8').trim();
            } catch {}
            const failuresBlock = failures
              ? ['**Failing tests:**', '', '```', failures, '```']
              : ['_Failing test names were not captured — see the run log._'];

            // Ensure the tracking label exists (idempotent).
            try {
              await github.rest.issues.getLabel({owner, repo, name: label});
            } catch {
              await github.rest.issues.createLabel({
                owner, repo, name: label, color: 'd73a4a',
                description: 'Auto-managed: nightly live-network test failures',
              });
            }

            const {data: open} = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: label,
            });
            const existing = open[0];

            if (outcome === 'failure') {
              const body = [
                'The nightly **live-network** test job failed against third-party',
                'services. This job is non-blocking (live servers can be flaky), but a',
                'persistent failure may indicate a real regression in an extractor.',
                '',
                ...failuresBlock,
                '',
                `Latest failing run: ${runUrl}`,
                '',
                '_Managed automatically — closes when the next nightly run passes._',
              ].join('\n');
              if (existing) {
                await github.rest.issues.update({owner, repo, issue_number: existing.number, body});
                await github.rest.issues.createComment({
                  owner, repo, issue_number: existing.number,
                  body: `Still failing — ${runUrl}`,
                });
              } else {
                await github.rest.issues.create({owner, repo, title, labels: [label], body});
              }
            } else if (existing) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.number,
                body: `Live-network tests recovered — closing. ${runUrl}`,
              });
              await github.rest.issues.update({owner, repo, issue_number: existing.number, state: 'closed'});
            }

  slow-tests:
    name: Slow Tests (Stress/Scale)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run slow tests (stress/scale scenarios)
        run: |
          uv run pytest tests/ \
            -m slow \
            --timeout=300 \
            -v

  dependency-check:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Note: Job-level continue-on-error removed. Only audit steps soft-fail.
    # Setup steps (checkout, uv, python) fail fast on errors.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Full security audit
        # Soft-fail: security-audit.yml creates issues, this is informational.
        # Ignores come from the single-source .pip-audit-ignores file (expiry +
        # reason per entry). Same file feeds ci.yml and security-audit.yml.
        continue-on-error: true
        run: |
          echo "=== Dependency security audit ==="
          # shellcheck disable=SC2046  # intentional word-splitting of the flag list
          uv run pip-audit --strict \
            $(uv run python scripts/pip_audit_ignores.py)

      - name: Check for outdated dependencies
        # Informational only, soft-fail
        continue-on-error: true
        run: |
          echo "=== Outdated dependencies ==="
          uv pip list --outdated

  iceberg-e2e-full:
    name: Iceberg E2E Tests (Full Suite)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra iceberg --extra dev --extra e2e

      - name: Start Docker services
        run: docker compose -f tests/iceberg/e2e/docker-compose.yml up -d --wait

      - name: Wait for REST catalog
        run: timeout 60 bash -c 'until curl -sf http://localhost:8181/v1/config; do sleep 2; done'

      - name: Wait for MinIO
        run: timeout 60 bash -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 2; done'

      - name: Run E2E tests (full suite, includes e2e_slow)
        run: uv run pytest tests/iceberg/e2e/ -v --tb=long -m e2e --timeout=120

      - name: Docker logs (on failure)
        if: failure()
        run: docker compose -f tests/iceberg/e2e/docker-compose.yml logs

      - name: Teardown
        if: always()
        run: docker compose -f tests/iceberg/e2e/docker-compose.yml down -v
