# .docsync/links.toml
# Code-to-documentation links for Portolan CLI
#
# When code changes, docsync checks if linked docs are stale.
# Run 'docsync check' to verify, 'docsync list-stale' to see stale docs.

# CLI reference is auto-generated from cli.py via mkdocs-click
[[link]]
code = "portolan_cli/cli.py"
docs = ["docs/reference/cli.md"]

# Configuration docs track config module changes
[[link]]
code = "portolan_cli/config.py"
docs = ["docs/reference/configuration.md"]

[[link]]
code = "portolan_cli/conversion_config.py"
